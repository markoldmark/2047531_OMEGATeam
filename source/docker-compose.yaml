services:
  # --- SIMULATORE MARZIANO (Fornito) ---
  simulator:
    image: mars-iot-simulator:multiarch_v1
    container_name: mars_simulator
    ports:
      - "8080:8080"
    restart: unless-stopped

  # --- SERVIZIO DATABASE ---
  db:
    image: postgres:15-alpine
    container_name: DB_history
    environment:
      POSTGRES_USER: mars_user
      POSTGRES_PASSWORD: mars_password
      POSTGRES_DB: mars_iot_db
    ports:
      - "5432:5432"
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  # # --- SERVIZIO FRONTEND ---
  # frontend:
  #   build: 
  #     context: ./FE_dashboard
  #     dockerfile: Dockerfile
  #   container_name: FE_dashboard
  #   ports:
  #     - "3000:80"
  #   depends_on:
  #     - db
  #     - simulator
  #   restart: unless-stopped

  # --- SERVIZIO FRONTEND (Modalità Sviluppo) ---
  frontend:
    build: 
      context: ./FE_dashboard
      dockerfile: Dockerfile.dev # <--- Puntiamo al nuovo file
    container_name: FE_dashboard
    ports:
      - "5173:5173" # <--- Cambia in 3000:3000 se usi Create React App
    volumes:
      # Questo volume "sincronizza" la tua cartella locale con quella del container
      - ./FE_dashboard:/app
      # Questo trucco evita che la tua cartella node_modules locale sovrascriva quella del container
      - /app/node_modules
    environment:
      # Forza l'aggiornamento dei file, super utile se sviluppi da Windows/WSL
      - CHOKIDAR_USEPOLLING=true 
    depends_on:
      - db
      - simulator
    restart: unless-stopped